<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Privada - GitHub</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        /* Estilo do Login */
        #login-container { background: #161b22; padding: 30px; border-radius: 10px; border: 1px solid #30363d; text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; background: #238636; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Estilo da Galeria (Escondida no início) */
        #galeria { display: none; text-align: center; width: 90%; max-width: 800px; padding: 20px; }
        .foto-box { margin-bottom: 30px; }
        .foto-box img { width: 100%; border-radius: 8px; border: 2px solid #30363d; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { color: #58a6ff; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>Acesso Restrito</h2>
        <input type="password" id="campoSenha" placeholder="Digite a senha...">
        <button onclick="verificar()">Entrar</button>
        <p id="erro" style="color: #f85149; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <div id="galeria">
        <h1>Minhas Fotos</h1>
        <div class="foto-box">
            <p>Foto 1</p>
            <img src="foto1.jpg" alt="Foto 1"> </div>
        <div class="foto-box">
            <p>Foto 2</p>
            <img src="foto2.jpg" alt="Foto 2">
        </div>
        <div class="foto-box">
            <p>Foto 3</p>
            <img src="foto3.jpg" alt="Foto 3">
        </div>
    </div>

    <script>
        function verificar() {
            const senhaSecreta = "danielteamo"; // <--- MUDE AQUI PARA A SUA SENHA
            const digitada = document.getElementById("campoSenha").value;
            
            if (digitada === senhaSecreta) {
                document.getElementById("login-container").style.display = "none";
                document.getElementById("galeria").style.display = "block";
            } else {
                document.getElementById("erro").innerText = "Senha incorreta!";
            }
        }
    </script>

</body>
</html>
