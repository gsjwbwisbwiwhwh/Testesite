<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel priv</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #login-box { background: #161b22; padding: 30px; border-radius: 10px; border: 1px solid #30363d; text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; text-align: center; }
        button { width: 100%; background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #galeria { display: none; text-align: center; width: 90%; max-width: 500px; padding: 20px; }
        .foto-box { margin-bottom: 25px; background: #161b22; padding: 10px; border-radius: 8px; border: 1px solid #30363d; }
        .foto-box p { margin: 5px 0; font-weight: bold; color: #58a6ff; }
        img { width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2>Acesso Privado</h2>
        <p>Digite a senha que eu te disse:</p>
        <input type="password" id="senha" placeholder="Senha...">
        <button onclick="entrar()">Entrar</button>
        <p id="erro" style="color: #f85149; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <div id="galeria">
        <h1>daniel</h1>
        
        <div class="foto-box">
            <p>foto do jogo</p>
            <img src="foto1.jpg">
        </div>

        <div class="foto-box">
            <p>Foto Minha feio demais</p>
            <img src="foto2.jpg">
        </div>

        <div class="foto-box">
            <p>Foto da pika</p>
            <img src="foto3.jpg">
        </div>
    </div>

    <script>
        function entrar() {
            const senhaDigitada = document.getElementById("senha").value;
            
            // A SENHA QUE VOCÊ PEDIU
            if (senhaDigitada === "daniellindo") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("galeria").style.display = "block";
            } else {
                document.getElementById("erro").innerText = "Senha incorreta!";
            }
        }
    </script>

</body>
</html>
