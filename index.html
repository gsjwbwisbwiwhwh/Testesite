<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player de Vídeo</title>
    <style>
        /* Estilização Black Mode */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            text-align: center;
        }

        .logo {
            color: #ff0000;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Container do Vídeo */
        .video-container {
            width: 100%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        video {
            width: 100%;
            display: block;
            outline: none;
        }

        .video-details {
            padding: 20px;
        }

        .video-details h1 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #efefef;
        }

        .status-badge {
            background: #222;
            color: #00ff00;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">DM PREMIUM</div>
    </header>

    <main class="video-container">
        <video controls poster="https://via.placeholder.com/800x450/111/fff?text=Carregando+Video...">
            <source src="https://drive.google.com/uc?export=download&id=1sDOnWWkG22p6QS8wL9iUM5nU3BH_RecY" type="video/mp4">
            Seu navegador não suporta a reprodução de vídeo.
        </video>

        <div class="video-details">
            <h1>Meu Vídeo Exclusivo</h1>
            <div class="status-badge">● Servidor: Google Drive (Online)</div>
        </div>
    </main>

</body>
</html>
